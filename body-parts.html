<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>My Body — Kids Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:linear-gradient(150deg,#b3f0e8 0%,#fcd5e8 55%,#fff3b0 100%);
  min-height:100svh;
  display:flex;flex-direction:column;align-items:center;
  overflow:hidden;
  font-family:'Segoe UI',Tahoma,sans-serif;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

a#back{
  position:fixed;top:14px;left:14px;
  background:#fff;border:1.5px solid rgba(0,0,0,.1);
  box-shadow:0 2px 12px rgba(0,0,0,.12);
  border-radius:50px;padding:8px 18px;
  color:#475569;font-weight:800;font-size:.82rem;
  text-decoration:none;z-index:200;
}

h1{
  margin-top:12px;
  font-size:1.3rem;font-weight:900;
  color:#4a2e7a;letter-spacing:-.5px;
}

#progress{
  font-size:.84rem;font-weight:700;color:#7c5fb5;margin-top:3px;min-height:1.2em;
}

#wrap{
  position:relative;
  height:min(470px,calc(100svh - 115px));
  aspect-ratio:300/520;
  margin-top:6px;
  flex-shrink:0;
}

svg{width:100%;height:100%;display:block;overflow:visible;}

/* ─── Hotspots ───────────────────────────────── */
.hs{
  position:absolute;
  transform:translate(-50%,-50%);
  width:20px;height:20px;
  cursor:pointer;
  touch-action:manipulation;
}

.hs-dot{
  position:absolute;inset:0;
  border-radius:50%;
  border:3px solid white;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
  z-index:3;
  transition:transform .12s,opacity .25s;
}

.hs:active .hs-dot{transform:scale(.72);}

.hs-ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:2.5px solid;
  animation:sonar 2.5s ease-out infinite;
  pointer-events:none;z-index:2;
}

@keyframes sonar{
  0%  {transform:scale(1);  opacity:.8;}
  100%{transform:scale(3.6);opacity:0;}
}

/* after first tap: ring fades out, dot dims */
.hs.seen .hs-ring{animation:none;opacity:0;}
.hs.seen .hs-dot {opacity:.42;transform:scale(.82);}

/* ─── Banner ─────────────────────────────────── */
#banner{
  position:fixed;
  bottom:-130px;left:50%;
  transform:translateX(-50%);
  background:#fff;
  border-radius:28px;
  padding:12px 42px 14px;
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
  transition:bottom .38s cubic-bezier(.34,1.56,.64,1);
  z-index:100;
  white-space:nowrap;
}
#banner.show{bottom:16px;}
#b-em  {font-size:1.9rem;line-height:1.1;}
#b-name{font-size:1.8rem;font-weight:900;color:#1e293b;margin-top:2px;}

/* ─── Sparkles ───────────────────────────────── */
.spark{
  position:fixed;pointer-events:none;
  font-size:1.4rem;z-index:999;
  animation:fly .65s ease-out forwards;
}
@keyframes fly{
  from{opacity:1;transform:translate(0,0) scale(1.2);}
  to  {opacity:0;transform:translate(calc(var(--tx)*1px),calc(var(--ty)*1px)) scale(.1);}
}
</style>
</head>
<body>

<a id="back" href="index.html">← All Games</a>
<h1>My Body 🩺</h1>
<div id="progress">Tap a body part to learn its name!</div>

<div id="wrap">

<!-- ════════════════════════════════════════════

════════════════════════════════════════════ -->

</svg>

</div><!-- /#wrap -->

<div id="banner">
  <div id="b-em"></div>
  <div id="b-name"></div>
</div>

<script>
// [name, speak-text, emoji, cx (SVG 0-300), cy (SVG 0-520), dot-color, ring-color]
const PARTS = [
  ['Hair',      'Hair',      '💜', 150,  10, '#C06ED4'],
  ['Head',      'Head',      '🧠', 178,  56, '#FF6B6B'],
  ['Eyes',      'Eyes',      '👀', 126,  86, '#4ECDC4'],
  ['Ears',      'Ears',      '👂',  84,  96, '#9B59B6'],
  ['Nose',      'Nose',      '👃', 150, 105, '#FFB347'],
  ['Mouth',     'Mouth',     '😄', 150, 136, '#EF4444'],
  ['Neck',      'Neck',      '📿', 150, 171, '#45B7D1'],
  ['Shoulders', 'Shoulders', '💪',  90, 200, '#6BCB77'],
  ['Arms',      'Arms',      '💪',  51, 252, '#4D96FF'],
  ['Hands',     'Hands',     '🤚',  48, 323, '#B5179E'],
  ['Tummy',     'Tummy',     '🌟', 150, 259, '#FF8C42'],
  ['Legs',      'Legs',      '🦵', 110, 390, '#4D96FF'],
  ['Knees',     'Knees',     '💠', 132, 420, '#06D6A0'],
  ['Feet',      'Feet',      '🦶', 116, 470, '#FFB703'],
];

const SPARKS  = ['✨','⭐','🌟','💫','🎉','💥'];
const wrap    = document.getElementById('wrap');
const banner  = document.getElementById('banner');
const bEm     = document.getElementById('b-em');
const bName   = document.getElementById('b-name');
const prog    = document.getElementById('progress');
let   found   = 0;
let   hideTimer;

PARTS.forEach(([name, speakText, emoji, cx, cy, color], i) => {
  const d1 = ((i * 0.22) % 2.5).toFixed(2);
  const d2 = ((i * 0.22) % 2.5 + 1.25).toFixed(2);

  const el = document.createElement('div');
  el.className = 'hs';
  el.style.left = (cx / 300 * 100) + '%';
  el.style.top  = (cy / 520 * 100) + '%';
  el.innerHTML  = `
    <div class="hs-ring" style="border-color:${color};animation-delay:${d1}s"></div>
    <div class="hs-ring" style="border-color:${color};animation-delay:${d2}s"></div>
    <div class="hs-dot"  style="background:${color}"></div>
  `;

  el.addEventListener('pointerdown', ev => {
    ev.preventDefault();
    const r = el.getBoundingClientRect();
    onTap(name, speakText, emoji, color, el, r.left + r.width / 2, r.top + r.height / 2);
  });

  wrap.appendChild(el);
});

function onTap(name, speakText, emoji, color, el, px, py) {
  const isNew = !el.classList.contains('seen');
  el.classList.add('seen');

  if (isNew) {
    found++;
    prog.textContent = found < PARTS.length
      ? `Found ${found} of ${PARTS.length}! Keep going!`
      : `You found all ${PARTS.length}! Amazing! 🎉`;
  }

  burst(px, py, color);
  showBanner(name, emoji, color);
  speak(speakText);
}

function showBanner(name, emoji, color) {
  bEm.textContent   = emoji;
  bName.textContent = name;
  bName.style.color = color;
  banner.classList.add('show');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => banner.classList.remove('show'), 2400);
}

function burst(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className   = 'spark';
    el.textContent = SPARKS[i % SPARKS.length];
    const angle = (i / 10) * Math.PI * 2;
    const dist  = 55 + Math.random() * 65;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.setProperty('--tx', Math.round(Math.cos(angle) * dist));
    el.style.setProperty('--ty', Math.round(Math.sin(angle) * dist));
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }
}

// Speech
let voices = [];
const loadVoices = () => { voices = speechSynthesis.getVoices(); };
speechSynthesis.addEventListener('voiceschanged', loadVoices);
loadVoices();

function bestVoice() {
  return voices.find(v => v.name === 'Google US English')
      || voices.find(v => /^Samantha/i.test(v.name))
      || voices.find(v => /en-US/i.test(v.lang) && v.localService)
      || voices.find(v => /en-US/i.test(v.lang))
      || voices.find(v => /en/i.test(v.lang))
      || null;
}

function speak(text) {
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  const v   = bestVoice();
  if (v) utt.voice = v;
  utt.rate  = 0.88;
  utt.pitch = 1.0;
  speechSynthesis.speak(utt);
}
</script>
