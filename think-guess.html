<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Think &amp; Guess — Kids Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100svh;
  background:linear-gradient(145deg,#667eea 0%,#764ba2 100%);
  display:flex;flex-direction:column;
  font-family:'Segoe UI',Tahoma,sans-serif;
  user-select:none;-webkit-tap-highlight-color:transparent;
  overflow:hidden;
}

a#back{
  position:fixed;top:14px;left:14px;
  background:#fff;border:1.5px solid rgba(0,0,0,.1);
  box-shadow:0 2px 12px rgba(0,0,0,.12);
  border-radius:50px;padding:8px 18px;
  color:#475569;font-weight:800;font-size:.82rem;
  text-decoration:none;z-index:200;
}

/* ── HUD ── */
#hud{
  display:flex;align-items:center;justify-content:space-between;
  padding:56px 16px 0;flex-shrink:0;
}
#cat-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.22);border-radius:50px;
  padding:5px 13px;font-size:.8rem;font-weight:800;color:#fff;
}
#cat-icon{font-size:1.1rem;}
#qnum{font-size:.85rem;font-weight:800;color:rgba(255,255,255,.85);}

/* ── RIDDLE BOX ── */
#riddle-box{
  margin:10px 14px 0;
  background:rgba(255,255,255,.15);backdrop-filter:blur(6px);
  border-radius:18px;padding:13px 16px 10px;
  cursor:pointer;flex-shrink:0;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
#riddle-box:active{background:rgba(255,255,255,.28);}
#riddle-text{
  font-size:clamp(.83rem,2.4vw,.97rem);
  font-weight:700;color:#fff;
  line-height:1.58;text-align:center;
}
#riddle-hint{
  text-align:center;margin-top:7px;
  font-size:.72rem;font-weight:700;
  color:rgba(255,255,255,.5);letter-spacing:.02em;
}

/* ── CHOICES ── */
#choices{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:10px;
  padding:10px 14px 8px;
  transition:opacity .22s;
}

.choice{
  background:#fff;border-radius:20px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:7px;cursor:pointer;
  box-shadow:0 5px 20px rgba(0,0,0,.22);
  transition:transform .13s,box-shadow .13s;
  position:relative;overflow:hidden;
  touch-action:manipulation;
}
.choice:active:not(.eliminated):not(.correct){transform:scale(.92);}
.c-emoji{font-size:clamp(2.6rem,8vw,3.4rem);line-height:1.05;}
.c-label{font-size:clamp(.78rem,2.4vw,.92rem);font-weight:900;color:#334155;}

/* Wrong → shake → eliminated */
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%    {transform:translateX(-9px);}
  50%    {transform:translateX(9px);}
  75%    {transform:translateX(-5px);}
}
.choice.wrong{animation:shake .4s ease;pointer-events:none;}
.choice.wrong::after,
.choice.eliminated::after{
  content:'❌';position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;
  background:rgba(239,68,68,.1);border-radius:20px;
}
.choice.eliminated{opacity:.3;pointer-events:none;}

/* Correct */
@keyframes pop{
  0%  {transform:scale(1);}
  40% {transform:scale(1.09);}
  75% {transform:scale(.97);}
  100%{transform:scale(1);}
}
.choice.correct{
  animation:pop .45s ease;
  background:linear-gradient(135deg,#86efac,#22c55e);
  pointer-events:none;
}
.choice.correct .c-label{color:#14532d;}

/* ── PROGRESS BAR ── */
#prog-wrap{
  margin:0 14px 10px;height:6px;
  background:rgba(255,255,255,.18);border-radius:50px;flex-shrink:0;
}
#prog-fill{height:100%;background:#fff;border-radius:50px;transition:width .45s ease;}

/* ── END SCREEN ── */
#end{
  flex:1;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:28px 24px;
}
#end.show{display:flex;}

@keyframes bounceIn{
  0%  {transform:scale(0);}
  50% {transform:scale(1.25);}
  100%{transform:scale(1);}
}
#end-big{font-size:5.5rem;animation:bounceIn .65s ease;line-height:1;}
#end-title{font-size:2rem;font-weight:900;color:#fff;margin-top:10px;}
#end-sub  {font-size:.95rem;color:rgba(255,255,255,.72);font-weight:700;margin-top:6px;}
#end-score{font-size:3.8rem;font-weight:900;color:#fde047;margin:12px 0 4px;}
#end-msg  {font-size:.92rem;color:rgba(255,255,255,.68);font-weight:700;margin-bottom:28px;}
#play-again{
  background:#fff;border:none;border-radius:50px;
  padding:15px 48px;font-size:1.15rem;font-weight:900;
  color:#7c3aed;cursor:pointer;
  box-shadow:0 6px 24px rgba(0,0,0,.25);
  transition:transform .13s;
}
#play-again:active{transform:scale(.93);}

/* ── SPARKLES ── */
.spark{
  position:fixed;pointer-events:none;font-size:1.3rem;
  z-index:999;animation:fly .65s ease-out forwards;
}
@keyframes fly{
  from{opacity:1;transform:translate(0,0) scale(1.2);}
  to  {opacity:0;transform:translate(calc(var(--tx)*1px),calc(var(--ty)*1px)) scale(.1);}
}
</style>
</head>

    q:   'I come in a pair — you always need two of me. You put me on your feet before going outside. I keep your feet safe and comfy. What am I?',
    win: 'Great! We wear shoes to protect our feet and keep them cozy and safe!',
    ans: 1, ch:[['🧦','Socks'],['👟','Shoes'],['🧤','Gloves'],['🎩','Hat']] },

  // ── COLOURS (4) ───────────────────────────────────────────────────────────
  { cat:'🎨', catName:'Colour',
    q:   'I am the colour of fire engines, strawberries, and apples. I am bright and bold and very easy to notice! What colour am I?',
    win: 'Red is a bold, beautiful colour — the colour of love and fire and apples!',
    ans: 2, ch:[['🔵','Blue'],['🟡','Yellow'],['🔴','Red'],['🟢','Green']] },

  { cat:'🎨', catName:'Colour',
    q:   'I am the colour of the sky on a sunny day. I am also the colour of the deep deep ocean. What colour am I?',
    win: 'Beautiful blue — the colour of the sky above us and the sea around us!',
    ans: 1, ch:[['🟣','Purple'],['🔵','Blue'],['🟠','Orange'],['⚫','Black']] },

  { cat:'🎨', catName:'Colour',
    q:   'I am the colour of the sun, ripe bananas, and lemons. I am bright and cheerful and make people feel happy! What colour am I?',
    win: 'Yellow is the colour of sunshine — it makes everything feel warm and bright!',
    ans: 2, ch:[['🔴','Red'],['🟢','Green'],['🟡','Yellow'],['🟤','Brown']] },

  { cat:'🎨', catName:'Colour',
    q:   'I am the colour of grass, frogs, and the leaves on trees. I am the colour of nature and the outdoors. What colour am I?',
    win: 'Green is the colour of nature — trees, plants, and so many beautiful animals!',
    ans: 3, ch:[['🔴','Red'],['🔵','Blue'],['🟡','Yellow'],['🟢','Green']] },
];

// ── Helpers ──────────────────────────────────────────────────────────────
const SPARKS = ['✨','⭐','🌟','💫','🎉','💥','🎊'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepRiddles() {
  return shuffle(RIDDLES).map(r => {
    const correct = r.ch[r.ans];
    const ch      = shuffle(r.ch);
    return { ...r, ch, ans: ch.indexOf(correct) };
  });
}

function burst(x, y) {
  for (let i = 0; i < 12; i++) {
    const el       = document.createElement('div');
    el.className   = 'spark';
    el.textContent = SPARKS[i % SPARKS.length];
    const a  = (i / 12) * Math.PI * 2;
    const d  = 55 + Math.random() * 80;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.setProperty('--tx', Math.round(Math.cos(a) * d));
    el.style.setProperty('--ty', Math.round(Math.sin(a) * d));
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }
}

// ── Speech ────────────────────────────────────────────────────────────────
let voices = [];
const loadVoices = () => { voices = speechSynthesis.getVoices(); };
speechSynthesis.addEventListener('voiceschanged', loadVoices);
loadVoices();

function getVoice() {
  return voices.find(v => /siri/i.test(v.name))
      || voices.find(v => v.name === 'Google US English')
      || voices.find(v => /^Samantha/i.test(v.name))
      || voices.find(v => /en-US/i.test(v.lang) && v.localService)
      || voices.find(v => /en-US/i.test(v.lang))
      || voices.find(v => /en/i.test(v.lang))
      || null;
}

// Split into sentences so each chunk sounds natural, with a breath pause between.
// onDone is called once after the last chunk finishes (or immediately if cancelled).
let _speakToken = 0;

function speak(text, rate = 0.88, onDone = null) {
  speechSynthesis.cancel();
  const token  = ++_speakToken;
  const chunks = (text.match(/[^.!?]+[.!?]*/g) ?? [text]).map(s => s.trim()).filter(Boolean);
  let i = 0;

  const next = () => {
    if (_speakToken !== token) return;
    if (i >= chunks.length) { onDone?.(); return; }
    const u = new SpeechSynthesisUtterance(chunks[i++]);
    const v = getVoice();
    if (v) u.voice = v;
    u.rate   = rate;
    u.pitch  = 1.0;
    u.volume = 1;
    u.onend  = () => { if (_speakToken === token) setTimeout(next, 85); };
    speechSynthesis.speak(u);
  };
  next();
}

// ── State & DOM refs ──────────────────────────────────────────────────────
let shuffled  = [];
let qi        = 0;
let score     = 0;
let firstTry  = true;
let locked    = false;

const catIconEl = document.getElementById('cat-icon');
const catNameEl = document.getElementById('cat-name');
const qnumEl    = document.getElementById('qnum');
const rText     = document.getElementById('riddle-text');
const rBox      = document.getElementById('riddle-box');
const choicesEl = document.getElementById('choices');
const progFill  = document.getElementById('prog-fill');
const hudEl     = document.getElementById('hud');
const progWrap  = document.getElementById('prog-wrap');
const endDiv    = document.getElementById('end');

rBox.addEventListener('click', () => speak(shuffled[qi].q, 0.85));
document.getElementById('play-again').addEventListener('click', restart);

// ── Game flow ─────────────────────────────────────────────────────────────
function start() {
  shuffled = prepRiddles();
  qi = 0; score = 0;
  hudEl.style.display    = '';
  rBox.style.display     = '';
  choicesEl.style.display = 'grid';
  progWrap.style.display = '';
  endDiv.classList.remove('show');
  loadQ(0);
}

function loadQ(idx) {
  const r  = shuffled[idx];
  firstTry = true;
  locked   = false;

  catIconEl.textContent = r.cat;
  catNameEl.textContent = r.catName;
  qnumEl.textContent    = `${idx + 1} / ${RIDDLES.length}`;
  progFill.style.width  = (idx / RIDDLES.length * 100) + '%';
  rText.textContent     = r.q;

  choicesEl.innerHTML = '';
  r.ch.forEach(([emoji, label], i) => {
    const d = document.createElement('div');
    d.className   = 'choice';
    d.innerHTML   = `<div class="c-emoji">${emoji}</div><div class="c-label">${label}</div>`;
    d.addEventListener('click', () => onTap(d, i === r.ans));
    choicesEl.appendChild(d);
  });

  setTimeout(() => speak(r.q, 0.85), 400);
}

function onTap(el, correct) {
  if (locked || el.classList.contains('eliminated') || el.classList.contains('wrong')) return;

  if (correct) {
    locked = true;
    if (firstTry) score++;

    el.classList.add('correct');
    const rc = el.getBoundingClientRect();
    burst(rc.left + rc.width / 2, rc.top + rc.height / 2);

    // Move to next question only after the win sentence finishes speaking.
    // Safety net fires after 9s in case speech stalls.
    const goNext = (() => { let done=false; return () => { if(!done){done=true; nextQ();} }; })();
    setTimeout(() => speak(shuffled[qi].win, 0.92, () => setTimeout(goNext, 500)), 150);
    setTimeout(goNext, 9000);

  } else {
    firstTry = false;
    el.classList.add('wrong');
    setTimeout(() => {
      el.classList.remove('wrong');
      el.classList.add('eliminated');
    }, 430);
    speak('Oops! Try again!', 0.95);
  }
}

function nextQ() {
  qi++;
  if (qi >= RIDDLES.length) { showEnd(); return; }

  choicesEl.style.opacity = '0';
  rBox.style.opacity      = '0';
  setTimeout(() => {
    loadQ(qi);
    choicesEl.style.opacity = '1';
    rBox.style.opacity      = '1';
  }, 250);
}

// Smooth opacity transitions
choicesEl.style.transition = 'opacity .22s';
rBox.style.transition      = 'opacity .2s';

function showEnd() {
  hudEl.style.display     = 'none';
  rBox.style.display      = 'none';
  choicesEl.style.display = 'none';
  progWrap.style.display  = 'none';

  const pct = Math.round(score / RIDDLES.length * 100);
  document.getElementById('end-score').textContent = `${score} / ${RIDDLES.length}`;
  document.getElementById('end-msg').textContent   =
    pct >= 80 ? 'Incredible! You are a superstar! 🌟' :
    pct >= 50 ? 'Well done! Keep practising! 💪'      :
                'Good try! Play again to learn more! 🎈';

  endDiv.classList.add('show');

  setTimeout(() => burst(window.innerWidth * .5, window.innerHeight * .35), 100);
  setTimeout(() => burst(window.innerWidth * .25, window.innerHeight * .5), 350);
  setTimeout(() => burst(window.innerWidth * .75, window.innerHeight * .5), 600);
  setTimeout(() => speak('Hooray! You finished! Well done!'), 400);
}

function restart() {
  hudEl.style.display     = '';
  rBox.style.display      = '';
  choicesEl.style.display = 'grid';
  progWrap.style.display  = '';
  endDiv.classList.remove('show');
  start();
}

start();
</script>
